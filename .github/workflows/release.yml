name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    name: macOS (universal)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add cross-compile target
        run: rustup target add x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build aarch64
        run: |
          RUSTFLAGS='-C link-arg=-s' MACOSX_DEPLOYMENT_TARGET="11.0" \
            cargo build --release --target=aarch64-apple-darwin -p volt

      - name: Build x86_64
        run: |
          RUSTFLAGS='-C link-arg=-s' MACOSX_DEPLOYMENT_TARGET="10.15" \
            cargo build --release --target=x86_64-apple-darwin -p volt

      - name: Create universal binary
        run: |
          lipo target/{x86_64,aarch64}-apple-darwin/release/volt \
            -create -output target/release/volt

      - name: Package Volt.app
        run: |
          APP_DIR=target/release/osx/Volt.app
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp -fRp misc/osx/Volt.app/Contents/* "$APP_DIR/Contents/"
          cp -fp target/release/volt "$APP_DIR/Contents/MacOS/volt"

          # Stamp version from tag
          VERSION=${GITHUB_REF_NAME#v}
          sed -i '' "s/{{.Version}}/$VERSION/g" "$APP_DIR/Contents/Info.plist"

          # Ad-hoc codesign
          codesign --remove-signature "$APP_DIR" || true
          codesign --force --deep --sign - "$APP_DIR"

      - name: Create zip
        run: |
          cd target/release/osx
          zip -r ../../../Volt-macos-universal.zip Volt.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: Volt-macos-universal.zip
          body: |
            ## Installation (macOS)

            1. Download `Volt-macos-universal.zip`
            2. Unzip and drag `Volt.app` to `/Applications`
            3. First launch: right-click → Open (bypasses Gatekeeper for unsigned apps)

            Works on both Intel and Apple Silicon Macs.
