<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bolt" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe14d"/>
      <stop offset="50%" style="stop-color:#f5c211"/>
      <stop offset="100%" style="stop-color:#e09500"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feFlood flood-color="#f5c211" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Full black background — no rounded corners, fills entire icon -->
  <rect x="0" y="0" width="1024" height="1024" fill="#000000"/>

  <!-- Yellow lightning bolt -->
  <g filter="url(#glow)">
    <polygon
      points="590,105 295,510 475,510 420,920 725,440 535,440 620,105"
      fill="url(#bolt)"
    />
  </g>
</svg>
