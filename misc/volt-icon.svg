<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="bolt" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ffaa00"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: rounded square -->
  <rect x="32" y="32" width="960" height="960" rx="215" ry="215" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="32" y="32" width="960" height="960" rx="215" ry="215" fill="none" stroke="#333355" stroke-width="3"/>

  <!-- Terminal prompt lines (subtle background detail) -->
  <g opacity="0.12">
    <rect x="160" y="200" width="280" height="8" rx="4" fill="#ffffff"/>
    <rect x="160" y="240" width="420" height="8" rx="4" fill="#ffffff"/>
    <rect x="160" y="280" width="180" height="8" rx="4" fill="#ffffff"/>
    <rect x="160" y="680" width="350" height="8" rx="4" fill="#ffffff"/>
    <rect x="160" y="720" width="240" height="8" rx="4" fill="#ffffff"/>
    <rect x="160" y="760" width="400" height="8" rx="4" fill="#ffffff"/>
    <rect x="160" y="800" width="160" height="8" rx="4" fill="#ffffff"/>
  </g>

  <!-- Lightning bolt - the main icon -->
  <g filter="url(#outerGlow)">
    <polygon
      points="570,120 340,530 480,530 420,900 700,440 540,440 620,120"
      fill="url(#bolt)"
      filter="url(#glow)"
    />
  </g>

  <!-- Highlight edge on bolt -->
  <polygon
    points="570,120 340,530 480,530 420,900 700,440 540,440 620,120"
    fill="none"
    stroke="#ffffff"
    stroke-width="2"
    opacity="0.15"
  />
</svg>
